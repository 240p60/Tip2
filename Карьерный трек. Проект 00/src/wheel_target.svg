<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 620" width="600" height="620" font-family="Arial, Helvetica, sans-serif">
  <title>Колесо карьерного баланса — Через 5 лет (точка Б)</title>

  <!-- Заголовок -->
  <text x="300" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">
    Колесо карьерного баланса — Через 5 лет (точка Б)
  </text>
  <text x="300" y="54" text-anchor="middle" font-size="13" fill="#666">
    Шкала: 1 (минимум) — 10 (максимум)
  </text>

  <!-- Концентрические сетки для уровней 2, 4, 6, 8, 10 -->
  <polygon points="300,276 334,293 343,330 319,360 281,360 257,330 266,293"
           fill="none" stroke="#e3e3e3" stroke-width="1"/>
  <polygon points="300,232 369,265 386,340 338,399 262,399 214,340 231,265"
           fill="none" stroke="#e3e3e3" stroke-width="1"/>
  <polygon points="300,188 403,238 428,349 357,439 243,439 172,349 197,238"
           fill="none" stroke="#e3e3e3" stroke-width="1"/>
  <polygon points="300,144 438,210 471,359 376,478 224,478 129,359 162,210"
           fill="none" stroke="#e3e3e3" stroke-width="1"/>
  <polygon points="300,100 472,183 514,369 395,518 205,518 86,369 128,183"
           fill="none" stroke="#bdbdbd" stroke-width="1.5"/>

  <!-- Радиальные оси -->
  <line x1="300" y1="320" x2="300" y2="100" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="300" y1="320" x2="472" y2="183" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="300" y1="320" x2="514" y2="369" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="300" y1="320" x2="395" y2="518" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="300" y1="320" x2="205" y2="518" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="300" y1="320" x2="86"  y2="369" stroke="#bdbdbd" stroke-width="1"/>
  <line x1="300" y1="320" x2="128" y2="183" stroke="#bdbdbd" stroke-width="1"/>

  <!-- Подписи уровней (на верхней оси) -->
  <text x="306" y="280" font-size="10" fill="#999">2</text>
  <text x="306" y="236" font-size="10" fill="#999">4</text>
  <text x="306" y="192" font-size="10" fill="#999">6</text>
  <text x="306" y="148" font-size="10" fill="#999">8</text>
  <text x="306" y="108" font-size="10" fill="#999">10</text>

  <!-- Подписи осей (критерии) -->
  <text x="300" y="88"  text-anchor="middle" font-size="13" font-weight="600" fill="#222">Удалённая работа</text>
  <text x="482" y="178" text-anchor="start"  font-size="13" font-weight="600" fill="#222">Уровень дохода</text>
  <text x="522" y="373" text-anchor="start"  font-size="13" font-weight="600" fill="#222">Проф. рост</text>
  <text x="395" y="540" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Баланс работа/жизнь</text>
  <text x="205" y="540" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Интересные задачи</text>
  <text x="78"  y="373" text-anchor="end"    font-size="13" font-weight="600" fill="#222">Команда и культура</text>
  <text x="118" y="178" text-anchor="end"    font-size="13" font-weight="600" fill="#222">Стабильность компании</text>

  <!-- Значения целевого состояния: 9, 9, 9, 8, 9, 8, 8 -->
  <polygon points="300,122 455,197 493,364 376,478 215,498 129,359 162,210"
           fill="rgba(11, 110, 153, 0.30)" stroke="#0b6e99" stroke-width="2.5"/>

  <!-- Точки на вершинах полигона со значениями -->
  <g fill="#0b6e99">
    <circle cx="300" cy="122" r="4"/>
    <circle cx="455" cy="197" r="4"/>
    <circle cx="493" cy="364" r="4"/>
    <circle cx="376" cy="478" r="4"/>
    <circle cx="215" cy="498" r="4"/>
    <circle cx="129" cy="359" r="4"/>
    <circle cx="162" cy="210" r="4"/>
  </g>
  <g font-size="12" font-weight="700" fill="#073f57">
    <text x="312" y="119" text-anchor="start">9</text>
    <text x="464" y="193" text-anchor="start">9</text>
    <text x="502" y="360" text-anchor="start">9</text>
    <text x="385" y="475" text-anchor="start">8</text>
    <text x="206" y="495" text-anchor="end">9</text>
    <text x="120" y="355" text-anchor="end">8</text>
    <text x="153" y="206" text-anchor="end">8</text>
  </g>

  <!-- Легенда -->
  <g transform="translate(40, 590)">
    <rect x="0" y="-12" width="14" height="14" fill="rgba(11,110,153,0.4)" stroke="#0b6e99" stroke-width="1.5"/>
    <text x="22" y="0" font-size="13" fill="#222">Целевая оценка через 5 лет (точка Б)</text>
  </g>
</svg>
